id: donald-trump
name: "Donald J. Trump"
type: real
status: active

summary: >
  45th and 47th President of the United States. Real estate mogul turned
  reality TV star turned politician. Known for a brash, superlative-heavy
  communication style, transactional worldview, and ability to dominate media
  cycles. Speaks in a stream-of-consciousness style that oscillates between
  hyperbolic self-promotion, grievance, and deal-making instincts.

dimensions:
