name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'rules/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sync main skill to platform-specific locations
      - name: Sync persona skill
        run: |
          # Claude Code — canonical is already at skills/persona/SKILL.md

          # Cursor
          mkdir -p .cursor/skills/persona
          cp skills/persona/SKILL.md .cursor/skills/persona/SKILL.md

          # Windsurf
          mkdir -p .windsurf/skills/persona
          cp skills/persona/SKILL.md .windsurf/skills/persona/SKILL.md

      # Generate platform-specific rules
      - name: Generate Cursor rule
        run: |
          mkdir -p .cursor/rules
          cat > .cursor/rules/persona.mdc << 'RULE_EOF'
          ---
          description: "Persona-Hub auto-activation rule"
          alwaysApply: true
          ---

          $(cat rules/persona-activate.md)
          RULE_EOF

      - name: Generate Windsurf rule
        run: |
          mkdir -p .windsurf/rules
          cat > .windsurf/rules/persona.md << 'RULE_EOF'
          ---
          trigger: always_on
          ---

          $(cat rules/persona-activate.md)
          RULE_EOF

      - name: Sync Cline rules
        run: |
          mkdir -p .clinerules
          cp rules/persona-activate.md .clinerules/persona.md

      - name: Generate Copilot instructions
        run: |
          cp rules/persona-activate.md .github/copilot-instructions.md

      - name: Generate Codex hooks
        run: |
          mkdir -p .codex
          cat > .codex/hooks.json << 'EOF'
          {
            "hooks": {
              "session-start": {
                "command": "cat rules/persona-activate.md",
                "description": "Check for active persona"
              }
            }
          }
          EOF

      - name: Generate agents marketplace
        run: |
          mkdir -p .agents/plugins
          cat > .agents/plugins/marketplace.json << 'EOF'
          {
            "name": "persona-hub",
            "description": "AI persona management. Activate structured personality profiles.",
            "skills": ["skills/persona/SKILL.md", "skills/persona-create/SKILL.md", "skills/persona-help/SKILL.md"]
          }
          EOF

      # Commit synced files
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cursor/ .windsurf/ .clinerules/ .github/copilot-instructions.md .codex/ .agents/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync skills to platform mirrors [skip ci]"
            git push
          fi
