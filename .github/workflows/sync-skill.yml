name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'rules/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync skill files to platform mirrors
        run: |
          # Cursor skill
          mkdir -p .cursor/skills/persona-hub
          cp skills/persona-hub/SKILL.md .cursor/skills/persona-hub/SKILL.md

          # Windsurf skill
          mkdir -p .windsurf/skills/persona-hub
          cp skills/persona-hub/SKILL.md .windsurf/skills/persona-hub/SKILL.md

          # Cursor rule (with alwaysApply frontmatter)
          mkdir -p .cursor/rules
          {
            echo '---'
            echo 'description: "Persona-Hub auto-activation rule"'
            echo 'alwaysApply: true'
            echo '---'
            echo ''
            cat rules/persona-activate.md
          } > .cursor/rules/persona.mdc

          # Windsurf rule (with trigger frontmatter)
          mkdir -p .windsurf/rules
          {
            echo '---'
            echo 'trigger: always_on'
            echo '---'
            echo ''
            cat rules/persona-activate.md
          } > .windsurf/rules/persona.md

          # Cline
          mkdir -p .clinerules
          cp rules/persona-activate.md .clinerules/persona.md

          # Copilot
          cp rules/persona-activate.md .github/copilot-instructions.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cursor/ .windsurf/ .clinerules/ .github/copilot-instructions.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync skills to platform mirrors [skip ci]"
            git push
          fi
